<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Satellite Tracker</title>
  <!-- Include the CesiumJS JavaScript and CSS files -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.132/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.132/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <!-- Include satellite.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/6.0.1/satellite.min.js"></script>
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(42, 42, 42, 0.9);
      padding: 15px;
      border-radius: 8px;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      z-index: 1000;
      min-width: 250px;
      max-height: 80vh;
      overflow-y: auto;
    }
    #controls {
      position: absolute;
      top: 60px;
      right: 10px;
      background: rgba(42, 42, 42, 0.9);
      padding: 15px;
      border-radius: 8px;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      z-index: 1000;
    }
    .satellite-item {
      margin: 8px 0;
      padding: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .satellite-item:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .satellite-name {
      font-weight: bold;
      color: #00ff88;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      margin: 4px;
      font-size: 12px;
    }
    button:hover {
      background: #45a049;
    }
    #status {
      color: #ffaa00;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  
  <div id="info">
    <div style="font-weight: bold; margin-bottom: 10px; color: #00ff88;">Satellite Tracker</div>
    <div id="status">Loading satellite data...</div>
    <div id="satelliteList"></div>
  </div>

  <div id="controls">
    <button onclick="toggleOrbits()">Toggle Orbits</button>
    <button onclick="toggleLabels()">Toggle Labels</button>
    <button onclick="clearAll()">Clear Objects</button>
    <div style="margin-top: 10px;">
      <textarea id="inputBox" wrap="off" placeholder="Enter TLE" style="width: 95%; padding: 8px; border-radius: 4px; border: 1px solid #666; background: rgba(255,255,255,0.1); color: white; font-size: 12px; margin-bottom: 4px; font-family: monospace;"></textarea>
      <button onclick="confirmInput()" style="width: 95%;">Confirm</button>
    </div>
    <div style="margin-top: 10px; font-size: 11px;">
      <div>Updates every 1 minute</div>
      <div id="lastUpdate"></div>
    </div>
  </div>
  
  <script>

    // Set Cesium Ion access token
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5NjkzOTNjYy0xOGI4LTQ1M2QtOTNiOS0zNTM2OTFiMTg4MTQiLCJpZCI6MzIyMTQ3LCJpYXQiOjE3NTI2OTQ5ODV9.c5dy8PXgAJzN1kAyAjZ03WzqxgEYpS2mAJB6qU0Yq3U';

    // ArcGIS Access Token
    Cesium.ArcGisMapService.defaultAccessToken = 'AAPTxy8BH1VEsoebNVZXo8HurI6cJfJajry8XPl9zp46kC231QWCRVgtAoRG7lCczc-ERxWztOcgP3LadTYNUGwABUW-9PftIU9Foum_L15v82y2QsKEqFXSt2CUbmAhSwlwFtv-WuYRqPVx1LAMBKj_xwnQbn9ETuT3X8eh3AkjS8IZnNvlAcNU2-NTVdbJO6QIS83w-w_ia56cNifVYP0MWi2873Bh9bkOk5HWNB_HoQc.AT1_PJW9ifSN';

    // Initialize Cesium Viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain()
    });

    // Set Earth-centered view
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(0, 0, 12000000), // 12,000 km altitude
      orientation: {
        heading: 0.0,
        pitch: Cesium.Math.toRadians(-20), // Slight angle to see the curve
        roll: 0.0
      }
    });

    // ~7 km ground footprint half-width in degrees (~1° per 110 km)
    const VIEW_RADIUS_DEG = 7 / 110;

    // Color palette for different satellites
    const colors = [
      Cesium.Color.YELLOW,
      Cesium.Color.CYAN,
      Cesium.Color.LIME,
      Cesium.Color.MAGENTA,
      Cesium.Color.ORANGE,
      Cesium.Color.LIGHTBLUE,
      Cesium.Color.PINK,
      Cesium.Color.LIGHTGREEN,
      Cesium.Color.RED,
      Cesium.Color.WHITE
    ];

    // Single source of truth: array of tracked satellite objects.
    // Each entry: { data, satEntity, visionEntity, orbitEntity }
    let trackedSats = [];
    let showOrbits = true;
    let showLabels = true;

    // --- Shared TLE parsing helper ---
    // Returns a satData object or null on failure.
    function parseTLEBlock(name, line1, line2, now) {
      if (!line1.startsWith('1 ') || !line2.startsWith('2 ')) return null;
      try {
        const satrec = satellite.twoline2satrec(line1, line2);
        const pv = satellite.propagate(satrec, now);
        if (!pv.position) return null;
        const gmst = satellite.gstime(now);
        const posGd = satellite.eciToGeodetic(pv.position, gmst);
        return {
          name,
          tle1: line1,
          tle2: line2,
          satrec,
          lon: satellite.degreesLong(posGd.longitude),
          lat: satellite.degreesLat(posGd.latitude),
          alt: posGd.height * 1000 // km → metres
        };
      } catch (e) {
        console.warn(`Error processing satellite ${name}:`, e);
        return null;
      }
    }

    // Fetch TLE data from Celestrak and return array of satData objects
    const fetchTLEandSatProp = async () => {
      try {
        const res = await fetch('https://celestrak.org/NORAD/elements/gp.php?NAME=ISS&FORMAT=tle');
        const text = await res.text();
        const lines = text.trim().replace(/\r\n/g, '\n').split('\n');
        const now = new Date();
        const sets = [];

        for (let i = 0; i + 2 < lines.length; i += 3) {
          const satData = parseTLEBlock(
            lines[i].trim(),
            lines[i + 1].trim(),
            lines[i + 2].trim(),
            now
          );
          if (satData) sets.push(satData);
        }

        return sets;
      } catch (error) {
        console.error('Error fetching TLE data:', error);
        return [];
      }
    };

    // Calculate orbit ground-track points for one full orbital period
    function calculateOrbitPoints(satrec, startTime, numPoints = 180) {
      const points = [];
      const period = 2 * Math.PI / satrec.no; // minutes
      const timeStep = (period / numPoints) * 60 * 1000; // ms

      for (let i = 0; i < numPoints; i++) {
        const time = new Date(startTime.getTime() + i * timeStep);
        try {
          const pv = satellite.propagate(satrec, time);
          if (pv.position) {
            const gmst = satellite.gstime(time);
            const posGd = satellite.eciToGeodetic(pv.position, gmst);
            points.push(Cesium.Cartesian3.fromDegrees(
              satellite.degreesLong(posGd.longitude),
              satellite.degreesLat(posGd.latitude),
              posGd.height * 1000
            ));
          }
        } catch (e) {
          // Skip invalid points
        }
      }
      return points;
    }

    // Create all Cesium entities for one satellite; returns { satEntity, visionEntity, orbitEntity }
    function createSatelliteEntity(satData, index) {
      const color = colors[index % colors.length];
      const position = Cesium.Cartesian3.fromDegrees(satData.lon, satData.lat, satData.alt);
      // positionView is at 10,000 m so the ellipse drapes near the surface
      const positionView = Cesium.Cartesian3.fromDegrees(satData.lon, satData.lat, 10000);
      const radius = Math.tan(Math.PI / 12) * satData.alt;

      const satEntity = viewer.entities.add({
        name: satData.name,
        position,
        point: {
          pixelSize: 15,
          color,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.NONE
        },
        label: {
          text: satData.name,
          font: '12pt sans-serif',
          pixelOffset: new Cesium.Cartesian2(0, -30),
          fillColor: color,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          show: showLabels
        }
      });

      // Only show field-of-view ellipse below 20,000 km — above that the
      // footprint covers most of the globe and isn't useful to display.
      const visionEntity = satData.alt <= 20000000
        ? viewer.entities.add({
            name: `${satData.name} Field of View`,
            position: positionView,
            ellipse: {
              semiMinorAxis: radius,
              semiMajorAxis: radius,
              material: color.withAlpha(0.2),
              outlineColor: Cesium.Color.BLACK,
              outlineWidth: 1
            }
          })
        : null;

      // Build orbit polyline and return its entity directly
      const orbitPoints = calculateOrbitPoints(satData.satrec, new Date());
      const orbitEntity = orbitPoints.length > 0
        ? viewer.entities.add({
            name: `${satData.name} Orbit`,
            polyline: {
              positions: orbitPoints,
              width: 2,
              material: color.withAlpha(0.7),
              clampToGround: false,
              show: showOrbits
            }
          })
        : null;

      return { satEntity, visionEntity, orbitEntity };
    }

    // Add a satData object to the scene and tracking array
    function addSatellite(satData) {
      const index = trackedSats.length;
      const { satEntity, visionEntity, orbitEntity } = createSatelliteEntity(satData, index);
      trackedSats.push({ data: satData, satEntity, visionEntity, orbitEntity });
    }

    // Update satellite positions (called every minute)
    function updateSatellitePositions() {
      const now = new Date();
      const gmst = satellite.gstime(now); // compute once for all sats

      trackedSats.forEach(({ data, satEntity, visionEntity }) => {
        if (!data.satrec || !satEntity) return;
        try {
          const pv = satellite.propagate(data.satrec, now);
          if (pv.position) {
            const posGd = satellite.eciToGeodetic(pv.position, gmst);
            const longitude = satellite.degreesLong(posGd.longitude);
            const latitude = satellite.degreesLat(posGd.latitude);
            const altitude = posGd.height * 1000;

            const position = Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude);
            const positionSurface = Cesium.Cartesian3.fromDegrees(longitude, latitude);

            satEntity.position = position;
            if (visionEntity) visionEntity.position = positionSurface;

            data.lon = longitude;
            data.lat = latitude;
            data.alt = altitude;
          }
        } catch (e) {
          console.warn(`Error updating ${data.name}:`, e);
        }
      });

      document.getElementById('lastUpdate').textContent = `Last: ${now.toLocaleTimeString()}`;
      updateSatelliteList();
    }

    // Update orbit polylines (called every 5 minutes)
    function updateOrbits() {
      const now = new Date();
      trackedSats.forEach(({ data, orbitEntity }) => {
        if (!data.satrec || !orbitEntity) return;
        const orbitPoints = calculateOrbitPoints(data.satrec, now);
        if (orbitPoints.length > 0) {
          orbitEntity.polyline.positions = orbitPoints;
        }
      });
    }

    // Rebuild the sidebar satellite list
    function updateSatelliteList() {
      const listDiv = document.getElementById('satelliteList');
      listDiv.innerHTML = '';

      trackedSats.forEach(({ data }, index) => {
        const div = document.createElement('div');
        div.className = 'satellite-item';
        div.onclick = () => flyToSatellite(index);
        div.innerHTML = `
          <div class="satellite-name">${data.name}</div>
          <div>Lat: ${data.lat.toFixed(4)}°</div>
          <div>Lon: ${data.lon.toFixed(4)}°</div>
          <div>Alt: ${(data.alt / 1000).toFixed(1)} km</div>
        `;
        listDiv.appendChild(div);
      });
    }

    // Fly camera to a tracked satellite by index
    function flyToSatellite(index) {
      const tracked = trackedSats[index];
      if (!tracked) return;
      const { data } = tracked;
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(data.lon, data.lat, data.alt + 1000000),
        orientation: {
          heading: Cesium.Math.toRadians(0.0),
          pitch: Cesium.Math.toRadians(-45.0)
        },
        duration: 2.0
      });
    }

    // --- Control functions ---

    window.toggleOrbits = function() {
      showOrbits = !showOrbits;
      trackedSats.forEach(({ orbitEntity }) => {
        if (orbitEntity?.polyline) orbitEntity.polyline.show = showOrbits;
      });
    };

    window.toggleLabels = function() {
      showLabels = !showLabels;
      trackedSats.forEach(({ satEntity }) => {
        if (satEntity?.label) satEntity.label.show = showLabels;
      });
    };

    window.clearAll = function() {
      viewer.entities.removeAll();
      trackedSats = [];
      document.getElementById('satelliteList').innerHTML = '';
      document.getElementById('status').textContent = 'Cleared';
    };

    window.confirmInput = function() {
      const TLE = document.getElementById('inputBox').value.trim();

      if (!TLE) {
        alert('Please enter TLE data');
        return;
      }

      const lines = TLE.replace(/\r\n/g, '\n').split('\n');

      if (lines.length < 3) {
        alert('Invalid TLE format. Need at least 3 lines per satellite: name, line1, line2');
        return;
      }

      const now = new Date();
      let successCount = 0;
      let errorCount = 0;

      for (let i = 0; i + 2 < lines.length; i += 3) {
        const satData = parseTLEBlock(
          lines[i].trim(),
          lines[i + 1].trim(),
          lines[i + 2].trim(),
          now
        );

        if (satData) {
          addSatellite(satData);
          successCount++;
        } else {
          console.warn(`Invalid or unpropagatable TLE at line ${i}`);
          errorCount++;
        }
      }

      if (successCount > 0) {
        updateSatelliteList();
        document.getElementById('status').textContent =
          `Loaded ${trackedSats.length} satellite${trackedSats.length !== 1 ? 's' : ''}`;
        flyToSatellite(trackedSats.length - successCount); // fly to first newly added
        document.getElementById('inputBox').value = '';
        if (errorCount > 0) {
          alert(`Successfully loaded ${successCount} satellite(s). ${errorCount} failed to load.`);
        }
      } else {
        alert(`Failed to load any satellites. ${errorCount} error(s) occurred. Check console for details.`);
      }
    };

    // Initialize the application
    async function initialize() {
      document.getElementById('status').textContent = 'Fetching TLE data...';

      try {
        const satelliteData = await fetchTLEandSatProp();

        if (satelliteData.length === 0) {
          document.getElementById('status').textContent = 'No satellites found';
          return;
        }

        satelliteData.forEach(satData => addSatellite(satData));
        document.getElementById('status').textContent =
          `Loaded ${trackedSats.length} satellite${trackedSats.length !== 1 ? 's' : ''}`;
        updateSatelliteList();

        setInterval(updateSatellitePositions, 60000);  // every 1 minute
        setInterval(updateOrbits, 300000);              // every 5 minutes

      } catch (error) {
        console.error('Initialization error:', error);
        document.getElementById('status').textContent = 'Error loading satellites';
      }
    }

    // Visual enhancements
    viewer.scene.skyAtmosphere.show = true;
    viewer.scene.globe.enableLighting = true;
    viewer.scene.postProcessStages.fxaa.enabled = true;

    initialize();
  </script>
</body>
</html>
